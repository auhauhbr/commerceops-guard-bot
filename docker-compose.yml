services:
  postgres:
    image: postgres:16-alpine
    container_name: commerceops-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-commerceops}
      POSTGRES_USER: ${POSTGRES_USER:-commerceops}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-commerceops}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - commerceops_postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: commerceops-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"

volumes:
  commerceops_postgres_data:
